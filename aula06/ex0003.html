<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: gray;
        }
        p{
            text-align: center;
            font-size: 1em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <script>
        var nome = prompt("Qual seu nome? ")
        document.writeln(`<p>Seu nome tem ${nome.length} letras!</p>`)
        document.writeln(`<p>Seu nome em maiúsculas é : ${nome.toUpperCase()}</p>`)
        document.writeln(`<p>Seu nome em minúsculas fica: ${nome.toLowerCase()}</p>`)
    </script>
</body>
</html>
